# Nginx server config for community.aminoprices.com -> NodeBB
#
# This is a SEPARATE config from accupep.conf. Each domain gets its own file.
# Do NOT add community.aminoprices.com to accupep.conf's server_name, and
# do NOT add accupep.com to this file's server_name.
#
# Install location on the VPS:
#   /etc/nginx/sites-available/community
# Then symlink into sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/community /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Preconditions (complete ALL before enabling this config):
#   1. DNS A record: community.aminoprices.com -> 187.124.84.241 (VPS IP)
#      Set this in Hostinger's DNS panel (aminoprices.com zone).
#      Verify: dig +short community.aminoprices.com  -> must return VPS IP.
#   2. NodeBB setup is complete (./nodebb setup finished with "Setup Completed").
#   3. NodeBB is running on 127.0.0.1:4567 via PM2:
#      pm2 start /var/www/aminoprices-forum/nodebb -- start
#      Verify: curl -i http://127.0.0.1:4567  -> should return HTML, not an error.
#   4. accupep.conf is already working (don't touch it).
#
# After enabling this config and verifying HTTP works, get an SSL cert:
#   sudo certbot --nginx -d community.aminoprices.com
# Certbot will automatically add listen 443 ssl and redirect blocks.

server {
    listen 80;
    listen [::]:80;
    server_name community.aminoprices.com;

    location / {
        proxy_pass http://127.0.0.1:4567;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support — required for NodeBB real-time features
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
