# Nginx server config for accupep.com -> Scraper FastAPI backend
#
# This is the canonical nginx config for the VPS that serves the Scraper API.
# Install location on the VPS:
#   /etc/nginx/sites-available/accupep
# Then symlink into sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/accupep /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Preconditions:
#   1. uvicorn (run.py) is listening on 127.0.0.1:8002
#      Verify: curl -i http://127.0.0.1:8002/health  -> {"ok": true}
#   2. Let's Encrypt cert exists for accupep.com:
#      /etc/letsencrypt/live/accupep.com/fullchain.pem
#      /etc/letsencrypt/live/accupep.com/privkey.pem
#      If missing, run: sudo certbot certonly --nginx -d accupep.com -d www.accupep.com
#   3. DNS A record for accupep.com points at the VPS public IP.
#
# NOTE: aminoprices.com is hosted on Hostinger (LiteSpeed + Cloudflare), NOT this VPS.
# Do NOT add aminoprices.com to any server_name here. The WordPress plugin on
# Hostinger calls out to https://accupep.com/api/... server-side — that is the
# only thing this VPS needs to serve.

# ---------------------------------------------------------------------------
# HTTP :80 — redirect to HTTPS, but allow ACME http-01 challenges through.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name accupep.com www.accupep.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS :443 — the real API entry point.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name accupep.com www.accupep.com;

    ssl_certificate     /etc/letsencrypt/live/accupep.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/accupep.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # CORS is handled inside FastAPI (allow_origins=["*"]), so nginx doesn't
    # need to inject CORS headers.

    # Direct health check (useful for uptime monitors).
    location = /health {
        proxy_pass http://127.0.0.1:8002/health;
        access_log off;
    }

    # Server-Sent Events stream (app/api/routes.py:1509 @router.get("/stream/prices")).
    # Buffering MUST be off or the stream hangs until proxy_read_timeout, and the
    # browser sees ERR_CONNECTION_TIMED_OUT exactly like the symptom we're fixing.
    location /api/stream/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       24h;
        chunked_transfer_encoding on;
    }

    # All other /api/* routes (see app/api/routes.py — routes are mounted at
    # /api by app/main.py: app.include_router(router, prefix="/api")).
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Anything else gets a 404 — this host serves the API only.
    location / {
        return 404;
    }
}
